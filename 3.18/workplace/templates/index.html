<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Baby Monitor</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        
        /* 모니터링 상태창 */
        .monitor-box {
            background: white; padding: 30px; margin: 20px auto;
            border-radius: 15px; max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 소리 크기 시각화 (막대그래프) */
        .volume-bar-container {
            width: 100%; height: 20px; background: #ddd;
            border-radius: 10px; margin: 20px 0; overflow: hidden; position: relative;
        }
        .volume-bar {
            width: 0%; height: 100%; background: #4CAF50;
            transition: width 0.1s, background-color 0.3s; /* 색상 전환 부드럽게 */
        }
        
        /* 임계값 선 (Threshold Line) */
        .threshold-line {
            position: absolute; top: 0; bottom: 0; width: 2px; background: red;
            left: 30%; z-index: 10;
        }

        /* 상태 텍스트 */
        .status-text { font-size: 24px; font-weight: bold; margin-bottom: 10px; transition: color 0.3s; }
        .result-text { font-size: 18px; color: #555; margin-top: 10px; min-height: 30px; }

        /* 버튼 */
        .btn-toggle {
            width: 100%; padding: 15px; font-size: 20px; border: none; border-radius: 10px;
            background: #2196F3; color: white; font-weight: bold; cursor: pointer;
            transition: background 0.3s;
        }
        .btn-toggle:hover { opacity: 0.9; }
        .btn-toggle.active { background: #F44336; } 

        /* 감도 조절 슬라이더 */
        .slider-container { margin-top: 20px; text-align: left; }
        input[type=range] { width: 100%; }
        
        /* 결과 강조 뱃지 */
        .badge { display: inline-block; padding: 5px 10px; border-radius: 5px; color: white; font-weight: bold; }
        .badge-normal { background-color: #4CAF50; }
        .badge-warning { background-color: #FF9800; }
    </style>
</head>
<body>

    <h1>👶 스마트 베이비 모니터</h1>

    <div class="monitor-box" style="border: 2px dashed #ccc;">
        <h3>📁 수동 오디오 파일 분석</h3>
        <form id="upload-form" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="file" name="file" accept="audio/*" id="audioFileInput" required>
            <button type="submit" class="btn-toggle" style="background: #673AB7;">선택한 파일 분석하기</button>
        </form>
        <div id="fileResult" class="result-text" style="margin-top: 15px;"></div>
    </div>

    <div class="monitor-box">
        <div class="status-text" id="statusMsg">대기 중...</div>
        
        <div class="volume-bar-container">
            <div class="volume-bar" id="volumeBar"></div>
            <div class="threshold-line" id="thresholdLine"></div>
        </div>

        <div class="result-text" id="aiResult">아직 감지된 소리가 없습니다.</div>

        <div class="slider-container">
            <label for="thresholdRange">🎚️ 감지 민감도 (현재: <span id="threshVal">30</span>)</label>
            <input type="range" id="thresholdRange" min="5" max="100" value="30">
            <small style="color:gray;">* 막대가 빨간 선을 넘으면 자동으로 5초간 녹음 및 분석이 시작됩니다.</small>
        </div>
    </div>

    <button class="btn-toggle" id="toggleBtn" onclick="toggleMonitoring()">🎙️ 실시간 모니터링 시작</button>

    <script>
        let isMonitoring = false;
        let isRecording = false; 
        let audioContext, analyser, microphone, stream;
        let dataArray;
        let monitoringInterval;
        
        // UI 요소 가져오기
        const statusMsg = document.getElementById('statusMsg');
        const volumeBar = document.getElementById('volumeBar');
        const thresholdLine = document.getElementById('thresholdLine');
        const toggleBtn = document.getElementById('toggleBtn');
        const aiResult = document.getElementById('aiResult');
        const threshInput = document.getElementById('thresholdRange');
        const threshVal = document.getElementById('threshVal');
        const uploadForm = document.getElementById('upload-form');
        const fileResult = document.getElementById('fileResult');
        const audioFileInput = document.getElementById('audioFileInput');

        // [이벤트] 슬라이더 조절 시 빨간 선 이동
        threshInput.addEventListener('input', (e) => {
            const val = e.target.value;
            threshVal.innerText = val;
            thresholdLine.style.left = val + "%"; 
        });

        // [이벤트] 파일 업로드 핸들러
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!audioFileInput.files || audioFileInput.files.length === 0) {
                alert("분석할 오디오 파일을 선택해주세요!");
                return;
            }

            const formData = new FormData(uploadForm);
            fileResult.innerHTML = "⏳ AI 모델이 파일을 분석 중입니다...";

            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok && !data.error) {
                    let confPercent = (data.confidence * 100).toFixed(1);
                    // 클래스 이름에 따라 뱃지 색상 변경
                    let badgeClass = data.result.toLowerCase().includes('non-crying') ? 'badge-normal' : 'badge-warning';
                    fileResult.innerHTML = `📄 분석 완료: <span class="badge ${badgeClass}">${data.result}</span> (신뢰도: ${confPercent}%)`;
                } else {
                    throw new Error(data.error || "서버 응답 오류");
                }
            } catch (err) {
                fileResult.innerHTML = "❌ 서버 통신 오류: " + err.message;
            }
        });

        // [함수] 모니터링 시작/중지 토글
        async function toggleMonitoring() {
            if (!isMonitoring) {
                // 시작 로직
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    startAudioAnalysis(stream);
                    
                    isMonitoring = true;
                    toggleBtn.innerHTML = "⏹️ 실시간 모니터링 중지";
                    toggleBtn.classList.add("active");
                    statusMsg.innerText = "👂 아기 소리 감시 중...";
                    statusMsg.style.color = "#2196F3"; 
                    aiResult.innerText = "모니터링이 시작되었습니다.";
                } catch (err) {
                    alert("마이크 권한이 거부되었거나 마이크를 찾을 수 없습니다.\n브라우저 설정에서 마이크 권한을 허용해주세요.");
                    console.error(err);
                }
            } else {
                // 중지 로직
                isMonitoring = false;
                isRecording = false; // 진행 중이던 녹음 상태도 강제 초기화
                toggleBtn.innerHTML = "🎙️ 실시간 모니터링 시작";
                toggleBtn.classList.remove("active");
                statusMsg.innerText = "대기 중...";
                statusMsg.style.color = "black";
                volumeBar.style.width = "0%";
                volumeBar.style.backgroundColor = "#4CAF50";
                
                // 리소스 정리
                if (monitoringInterval) clearInterval(monitoringInterval);
                if (audioContext && audioContext.state !== 'closed') audioContext.close();
                if (stream) {
                    stream.getTracks().forEach(track => track.stop()); // 마이크 사용 완전 종료
                }
            }
        }

        // [함수] 오디오 데시벨 분석
        function startAudioAnalysis(mediaStream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(mediaStream);
            microphone.connect(analyser);

            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            // 0.1초(100ms)마다 볼륨 체크 반복
            monitoringInterval = setInterval(() => {
                if (!isMonitoring) return;

                analyser.getByteFrequencyData(dataArray);

                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                let average = sum / bufferLength;
                
                // 시각화를 위해 값 보정 (0~100 사이 비율로 변환)
                let displayVol = Math.min(average * 2, 100); 
                volumeBar.style.width = displayVol + "%";

                const threshold = parseInt(threshInput.value);
                
                // 볼륨이 임계값을 넘고, 현재 녹음 중이 아닐 때 트리거
                if (displayVol > threshold && !isRecording) {
                    triggerRecording(mediaStream);
                }
            }, 100);
        }

        // [함수] 임계값 돌파 시 녹음 및 서버 전송
        function triggerRecording(mediaStream) {
            isRecording = true; 
            statusMsg.innerText = "🚨 큰 소리 감지! 5초간 녹음 중...";
            statusMsg.style.color = "#F44336"; // 빨간색
            volumeBar.style.backgroundColor = "#F44336"; 

            // 브라우저 호환성을 위해 webm 형식 사용 (서버에서 변환 혹은 직접 처리 필요)
            const options = { mimeType: 'audio/webm' };
            let mediaRecorder;
            try {
                mediaRecorder = new MediaRecorder(mediaStream, options);
            } catch (e) {
                // webm을 지원하지 않는 브라우저(ex: Safari 일부)를 위한 폴백
                mediaRecorder = new MediaRecorder(mediaStream); 
            }
            
            const audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                // 모니터링이 중간에 취소되었다면 전송하지 않음
                if (!isMonitoring) return;

                statusMsg.innerText = "☁️ AI 모델 분석 요청 중...";
                statusMsg.style.color = "#FF9800"; // 주황색
                volumeBar.style.backgroundColor = "#FF9800"; 

                // Blob 생성 (브라우저가 녹음한 원본 mimeType 그대로 사용)
                const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                const formData = new FormData();
                // 파일 확장자를 .webm으로 전송하여 서버가 헷갈리지 않게 함
                formData.append("file", audioBlob, "live_record.webm");

                fetch('/predict', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (!isMonitoring) return; // 응답 대기 중 모니터링을 껐다면 무시
                    if (data.error) throw new Error(data.error);
                    
                    const confPercent = (data.confidence * 100).toFixed(1);
                    let badgeClass = data.result.toLowerCase().includes('non-crying') ? 'badge-normal' : 'badge-warning';
                    
                    aiResult.innerHTML = `마지막 감지 결과: <span class="badge ${badgeClass}">${data.result}</span> (신뢰도: ${confPercent}%)`;
                    
                })
                .catch(err => {
                    if (isMonitoring) aiResult.innerText = "분석 실패: " + err.message;
                    console.error("서버 통신 에러:", err);
                })
                .finally(() => {
                    // 분석 완료 (성공/실패 무관) 후 쿨다운 적용
                    if (isMonitoring) {
                        setTimeout(() => {
                            isRecording = false; 
                            statusMsg.innerText = "👂 다시 소리 감시 중...";
                            statusMsg.style.color = "#2196F3";
                            volumeBar.style.backgroundColor = "#4CAF50"; 
                        }, 2000); // 2초 대기 후 다시 녹음 가능 상태로 복귀
                    }
                });
            };

            // 7초 후 녹음 강제 종료
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                }
            }, 7000);
        }
    </script>
</body>
</html>
